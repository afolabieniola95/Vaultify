<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index Page</title>
    <link rel="stylesheet" href="index.css">
  </head>
  <body>
   
<div id="signLogin-container">
  
  <div class="cards" id="cards">
  <div id="signLogin-body">
    
    <h3 class="logo">Vaultify</h3>
    
    <div style=" font-size: 20px; margin-bottom: 30px; text-align: center; font-weight: bold;">Log in your account</div>
    
    <div style="width: 100%; display: flex; align-items: center; flex-direction: column; gap: 30px;">
   <div class="input-wrapper">
    <input type="tel" id="loginPhone" placeholder=" "  required>
    <label for="loginPhone">Phone</label>
  </div>
       
   <div class="input-wrapper">
    <input type="password" id="loginPassword" placeholder=" " required>
    <label for="loginPassword">Password</label>
  </div>
  
  <!---forgotten Password Btn-->
  <div id="forgotten-password">Forgotten password</div>
  
  </div>
  <button  id="login"><span class="spinner"></span>
  Login</button>
  
  <p style="margin: 70px auto; text-align: center; flex: 1">
    Don't have account? 
  <span class="flipBtn" style="color: navy; font-size: 15px;">SignUp</span>
  </p>
  
     <div id="login-error"></div>
</div>


  <div id="signUp-body">
    
    <h3 class="logo">Vaultify</h3>
    
    <div style="font-size: 20px; color: black; margin-bottom: 30px; text-align: center; font-weight: bold;"> Get an Vaultify Account</div>

 <div style="width: 100%; display: flex; align-items: center; flex-direction: column; gap: 30px;">
  <div class="name-wrapper-container">
   <div class="input-wrapper">
    <input type="text" id="first-name" placeholder=" " maxlength="30" required>
   <label for="firstName">First Name</label>
    </div>
  
     <div class="input-wrapper">
    <input type="text" id="last-name" placeholder=" " maxlength="30" required>
   <label for="lastName">Last Name</label>
    </div>
    </div>
    
  <div class="emailPhone-wrapper-container">
    <div class="input-wrapper">
    <input type="email" id="signUp-email" placeholder=" " required>
   <label for="signUp-email">Email</label>
    </div>
    
   <div class="input-wrapper">
    <input type="tel" id="signUp-phone" placeholder=" " required maxlength="11">
   <label for="signUp-phone">Phone no</label>
    </div>
  </div>
  
  <div class="password-wrapper-container">
    <div style="position: relative; display: flex;">
   <div class="input-wrapper">
    <input type="password" id="create-password" maxlength="30"placeholder=" " required>
    <label for="create-password">Password</label>
  </div>
  
  <div class="strength-container">
     <div id="strength-bar"></div>
     </div>
  <p id="strength-text"></p>
  </div>
  </div>
  
    <div class="disabled-click"></div>
      </div>

<div style="display: flex; align-items: center; margin-top: 50px;">
 <button id="previous" style="background: grey; ">Previous</button>
 <button id="next">Next</button>
 </div>
 
  <button id="signUp" style="display: none">Create Account</button>
  
  <p style="margin: 70px auto; text-align: center; flex: 1">
    Do you have account? 
  <span class="flipBtn" style="color: navy; font-size: 15px;">Login</span>
  </p>
  
     <div id="signup-error"></div>

   </div>
</div><!--card closing tags-->

<div class="successBox-background"></div>
<div class="successfulBox">
  <img src="icon/success.gif">
</div>

</div><!--App Closing Tag-->

<!---forgotten Password Modal-->
  <div class="forgotten-password-modal">
  <div class="header">
    <img id="close-modal" src="icon/backarrow.png" style="width: 20px; height: 20px;">
    <p style="font-size: 18px;">Reset password</p>
  </div>
  
  <div style="padding: 40px 0; position: relative; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 30px; margin-top: 50px">
  
  <div class="input-wrapper" id="user-email">
    <input type="email" id="reset-password-email" placeholder=" "  required>
    <label for="reset-password-email">Email</label>
  </div>
  
    <div class="input-wrapper" id="new-password-box" style="display: none">
    <input type="password" id="newPasswords" placeholder=" " required>
    <label for="resetPassword">Password</label>
  </div>
  
   <div class="input-wrapper" id="confirm-password-box" style="display: none">
    <input type="password" id="confirmPasswords" placeholder=" " required>
    <label for="resetPassword">Confirm password</label>
  </div>
  
  <div class="reset-strength-container">
      <div id="newPassword-strength-bar"></div>
      </div>
     <p id="newPassword-strength-text"></p>
  </div>
        
     
  
   <button id="reset-btn">Next</button>
   
  <div class="reset-alert"></div>
  </div>
  
  
<script src="index.js" defer></script>
    
  </body>
</html>
