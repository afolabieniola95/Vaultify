<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdrawal</title>
    <style>
    body{
        margin: 0;
        font-family: Arial;
      }
      header{
       display: flex;
       align-items: center;
       width: 100%;
       height: 30px;
       background: navy;
      }
      h4{
        margin: 0;
        color: white;
      }
      .container{
        padding-top: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 20px;
      }
      
      .zoomed{
        font-size: 18px;
        animation: bounce 0.8s linear infinite;
      }
      
      @keyframes bounce{
        0%, 100% {transform: translateY(0);}
        50% {transform: translateY(-20px);}
      }
    </style>
  </head>
  <body>
    
    <header>
    <img onclick="history.back()" src="icon/backarrow white.png" style="width: 20px; height: 20px;">
    <h4>Withdrawal</h4>
    </header>
    
    <div class="container">
      <video src="icon/coming-soon.mp4" style="width: 100px; height: 100px;" autoplay muted ></video>
      <span class="zoomed">Under contruction.</span>
    </div>
